<!DOCTYPE html>
<html>
<head>
    <title>SecureChat</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #1e1f22;
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 70px;
            background: #111214;
        }

        /* Main chat */
        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #2b2d31;
        }

        .header {
            padding: 15px;
            background: #232428;
            font-weight: bold;
            color: #fff;
            border-bottom: 1px solid #1e1f22;
        }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .msg {
            display: flex;
            margin-bottom: 15px;
        }

        .msg.you {
            justify-content: flex-end;
        }

        .bubble {
            max-width: 60%;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            position: relative;
        }

        .you .bubble {
            background: #5865f2;
            color: white;
        }

        .other .bubble {
            background: #3a3c42;
            color: #ddd;
        }

        .time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 5px;
        }

        .input-area {
            display: flex;
            padding: 15px;
            background: #232428;
            border-top: 1px solid #1e1f22;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: #383a40;
            color: white;
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: #5865f2;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #4752c4;
        }

        .receive {
            background: #3ba55c;
        }

        .receive:hover {
            background: #2d7d46;
        }

    </style>
</head>

<body>

<div class="sidebar"></div>

<div class="chat">

    <div class="header">🔐 SecureChat</div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
        <input id="msgInput" placeholder="Type a secure message...">
        <button onclick="sendMessage()">Send</button>
        <button class="receive" onclick="receiveMessage()">Receive</button>
    </div>

</div>

<script>

function getTime() {
    let now = new Date();
    return now.getHours() + ":" + String(now.getMinutes()).padStart(2, '0');
}

function addMessage(text, type) {
    let msg = document.createElement("div");
    msg.classList.add("msg", type);

    msg.innerHTML = `
        <div class="bubble">
            ${text}
            <div class="time">${getTime()}</div>
        </div>
    `;

    document.getElementById("messages").appendChild(msg);

    document.getElementById("messages").scrollTop = 
        document.getElementById("messages").scrollHeight;
}

async function sendMessage() {
    let input = document.getElementById("msgInput");
    let text = input.value;

    if (!text) return;

    addMessage(text, "you");

    await fetch(`/secure-hide?message=${text}`);

    addMessage("Encrypted & hidden in image 🔐", "other");

    input.value = "";
}

async function receiveMessage() {
    let res = await fetch(`/secure-extract`);
    let text = await res.text();

    addMessage(text, "other");
}

</script>

</body>
</html>
